# Render blueprint for the Auriga Money API (the web app is deployed on Vercel).
# Secrets (JWT_SECRET, ENCRYPTION_KEY, SWAN_*, RESEND_API_KEY, SENTRY_DSN) are
# set in the Render dashboard / env groups, never committed.
services:
  - type: web
    name: auriga-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    plan: standard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: auriga-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: auriga-redis
          type: redis
          property: connectionString
      - fromGroup: auriga-secrets

  - type: redis
    name: auriga-redis
    plan: standard
    ipAllowList: []

databases:
  - name: auriga-postgres
    plan: standard
    postgresMajorVersion: "15"
